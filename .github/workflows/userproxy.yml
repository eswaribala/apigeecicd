name: Apigee Proxy CI/CD

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: npm install -g apigeelint apigeecli

      - name: Lint proxy
        run: apigeelint -s ./apiproxy

      - name: Package proxy
        run: zip -r userproxy.zip apiproxy

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: proxy-bundle
          path: userproxy.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v2
        with:
          name: proxy-bundle

      - name: Deploy API Proxy
        run: |
          apigeecli proxies create bundle \
            --org ${{ secrets.APIGEE_ORG }} \
            --env ${{ secrets.APIGEE_ENV }} \
            --token ${{ secrets.APIGEE_TOKEN }} \
            --file userproxy.zip
