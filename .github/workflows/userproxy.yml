name: Apigee Proxy CI/CD
  
on:
  push:
    branches:
      - master

 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: npm install -g apigeelint apigeecli

      - name: Unzip proxy bundle
        run: unzip userproxy.zip 

      - name: Lint proxy
        run: apigeelint -s ./apiproxy

      - name: Package proxy
        run: zip -r userproxy.zip apiproxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-bundle
          path: userproxy.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: proxy-bundle

      - name: Install Apigee CLI
        run: npm install -g apigeecli

      - name: Debug secrets
        run: |
          echo "Username": ${{ secrets.APIGEE_USERNAME }}
          
        env:
          APIGEE_USERNAME: ${{ secrets.APIGEE_USERNAME }}
          APIGEE_PASSWORD: ${{ secrets.APIGEE_PASSWORD }}

      - name: Deploy API Proxy
        run: |
          apigeecli proxies create bundle \
            --org ${{ secrets.APIGEE_ORG }} \
            --env ${{ secrets.APIGEE_ENV }} \
            --username ${{ secrets.APIGEE_USERNAME }} \
            --password ${{ secrets.APIGEE_PASSWORD }} \
            --file proxy-bundle/userproxy.zip
