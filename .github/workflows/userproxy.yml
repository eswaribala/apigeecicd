name: Apigee Proxy CI/CD
 
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: npm install -g apigeelint apigeecli

      - name: Unzip proxy bundle
        run: unzip userproxy.zip

      - name: Lint proxy
        run: apigeelint -s ./apiproxy

      - name: Package proxy
        run: zip -r userproxy.zip apiproxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-bundle
          path: userproxy.zip

 
